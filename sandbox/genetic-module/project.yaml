schema: responsible-genetic-sandbox/v1
identity:
  id: genetic-module-sandbox
  title: Genetic engine and mechanics probe
  status: ENGINE_WITH_EXTERNAL_TARGET_SUPPORT
objective: >-
  Provide a small persistent genetic engine for an external product-development
  sandbox, while retaining an owned-project mechanics probe for regression tests.
entrypoints:
  operation: README.md
  complete_intent: DESIGN_INTENT.md
  agent_rules: AGENTS.md
  runbook: RUNBOOK.md
directories:
  implementation: src/
  tools: tools/
  template: template/project/
  tasks: tasks/
  live_project: project/
  live_genetic_state: genetic/
  external_target_cli: tools/project-session-cli.ts
commands:
  setup: npm run setup
  status: npm run status
  scan: npm run scan
  resolve: npm run resolve
  checks:
    baseline: npm run check:baseline
    bybit: npm run check:bybit
    okx: npm run check:okx
  verify: npm run verify
invariants:
  - project/ and genetic/ are siblings with different owners.
  - A scan reads only configured tracked paths below project/.
  - A command writes module state only below genetic/.
  - No scan starts while another action is pending.
  - State is restored and validated on every command.
  - No Git commit or Git diff is required to detect a saved change.
  - No external model or simulated model is called by the sandbox.
  - A task milestone is selected explicitly and never inferred from batch count.
  - Bound-project setup writes only local development memory and never copies,
    deletes, or overwrites the external target.
reading_order:
  - AGENTS.md
  - README.md
  - project.yaml
  - genetic/STATUS.md
  - genetic/pending.json
  - the selected task in tasks/
  - DESIGN_INTENT.md only when changing the module or evaluating its direction
