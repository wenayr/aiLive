schema: responsible-sandbox-host/v1
identity:
  id: ai-live
  title: AI Live genetic sandbox host
  status: WORKING_BASELINE
objective: >-
  Keep one standalone genetic-module sandbox that a Codex agent can open as its
  complete working project and use before a Git commit exists.
entrypoints:
  overview: README.md
  foundation: doc/FOUNDATION.md
  genetic_module: doc/GENETIC_MODULE.md
  sandbox_contract: doc/SANDBOX_CONTRACT.md
  standalone_project: sandbox/genetic-module/
acceptance:
  command: npm run verify
  invariants:
    - The standalone project imports nothing from the host repository.
    - Saved project files can trigger a scan without a Git commit.
    - At most one genetic action is pending.
    - State survives a new CLI process.
    - No provider, model API, fixture model, browser, or shell controller is built in.
    - Live project and genetic state are ignored by Git.
reading_order:
  - README.md
  - project.yaml
  - doc/FOUNDATION.md
  - doc/GENETIC_MODULE.md
  - doc/SANDBOX_CONTRACT.md
  - sandbox/genetic-module/AGENTS.md
