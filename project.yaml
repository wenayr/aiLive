schema: product-development-host/v1
identity:
  id: ai-live
  title: AI Live product and development sandbox host
  status: TABLEER_PLATFORM_AND_TANKS3D_V13_PERSPECTIVE
objective: >-
  Develop ordinary product projects through explicit external development
  sandboxes. Start with Tableer while retaining the genetic engine as a small,
  reusable observer of saved product changes before a Git commit exists.
entrypoints:
  overview: README.md
  foundation: doc/FOUNDATION.md
  genetic_module: doc/GENETIC_MODULE.md
  architecture: doc/PROJECT_AND_DEVELOPMENT_SANDBOXES.md
  product_projects:
    - projects/tableer/
    - projects/tanks3d-simple/
    - projects/tanks3d-sandbox/
  development_sandboxes:
    - development/tableer/
    - development/tanks3d-sandbox/
  genetic_engine: sandbox/genetic-module/
acceptance:
  command: npm run verify
  invariants:
    - Tableer contains product modules and no agent runtime or genetic memory.
    - The external development sandbox can scan saved Tableer files without a Git commit.
    - Setup of the external sandbox does not copy, delete, or overwrite Tableer.
    - At most one genetic action is pending.
    - State survives a new CLI process.
    - No provider, model API, fixture model, browser, or shell controller is built in.
    - Live development memory is ignored by Git.
    - Tanks3D simple and sandbox variants remain separate product projects.
reading_order:
  - README.md
  - project.yaml
  - doc/FOUNDATION.md
  - doc/GENETIC_MODULE.md
  - doc/PROJECT_AND_DEVELOPMENT_SANDBOXES.md
  - development/tableer/AGENTS.md
  - projects/tableer/project.yaml
  - development/tanks3d-sandbox/AGENTS.md
  - projects/tanks3d-sandbox/project.yaml
