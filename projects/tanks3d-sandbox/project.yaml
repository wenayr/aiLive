schema: product-sandbox/v1
identity:
  id: tanks3d-sandbox
  title: Tanks 3D generator experiment
  status: ITERATION_NINE_V14_OPEN_ART_DIRECTION
objective: >-
  Build a playable browser game from ordinary product modules whose three real
  repeating resources are generated from compact source-of-truth inputs.
modules:
  arena_generator:
    path: src/generators/create-arena.mjs
    responsibility: Produce deterministic map profiles, walls and safe spawn pads from a seed.
  tank_generator:
    path: src/generators/create-tank.mjs
    responsibility: Produce validated tank entities with physical model parameters from named archetypes.
  wave_generator:
    path: src/generators/create-wave.mjs
    responsibility: Produce enemy spawns from arena pads and a round number.
  game_runtime:
    path: src/game/create-game.mjs
    responsibility: Coordinate input, movement, combat and generator outputs.
  renderer:
    path: src/render/create-renderer.mjs
    responsibility: Render product state on a browser canvas.
acceptance:
  command: npm run verify
  invariants:
    - No agent runtime, genetic memory or development instructions live here.
    - Same arena seed yields the same walls and spawn pads.
    - Generated tanks have a unique id and a known archetype.
    - Player aim is supplied in world coordinates and controls the barrel direction.
    - A selected map supplies safe core pads; collection converts one core into one turbo burst.
    - A defeated hostile produces score and one visible combat effect.
    - The field test renders a 130 by 130 world through a player camera.
    - Field blocks and enemy tanks each have hit points and can be destroyed.
    - A separate perspective test renders a native 3D chase-camera view with varied tank models.
    - Scenery seed produces repeatable natural ground and visible environment features.
reading_order:
  - README.md
  - project.yaml
  - test/generators.test.mjs
  - src/generators/create-arena.mjs
