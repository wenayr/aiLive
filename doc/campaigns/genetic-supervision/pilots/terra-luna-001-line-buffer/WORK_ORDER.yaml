schema: genetic-supervision-pilot/v0
id: terra-luna-001-line-buffer
version: 0.2.0
status: protocol-ready-adapter-binding-required
objective: >-
  Create a candidate-only test suite that characterizes createLineBuffer
  without modifying its stable implementation.
claim_under_test: >-
  A bounded Luna check can improve or validate Terra's work with low noise and
  a complete observable trace.
task_ingress:
  issuer_role: orchestrator-agent
  assignee: Terra
  source_of_truth: this work order
module_execution:
  protocol: genetic-supervision-pilot/v0
  module_id: lab-line-buffer-seed
  module_version: 0.1.0
  enter_before_candidate_write: true
  checkpoints:
    - before_luna_prepare
    - after_iteration_1_oracle
    - after_iteration_2_oracles
  exit_after_provisional_evaluation: true
  post_close_audit: required
roles:
  builder:
    alias: Terra
    tier: S2
    binding_metadata_required:
      - model_id
      - model_version
  genetic_checker:
    alias: Luna
    tier: S1
    write_authority: none
iterations:
  materialization: 2
  luna_calls:
    - prepare
    - review_iteration_1
    - verify_iteration_2
scope:
  read:
    - AGENTS.md
    - project.yaml
    - doc/lab/FOUNDATION.md
    - doc/lab/ARCHITECTURE.md
    - src/lab/utility/line-buffer.ts
    - src/lab/transform/run-state.test.ts
    - src/lab/resource/run-store.test.ts
    - package.json
    - package-lock.json
    - vite.config.ts
    - .gitignore
    - doc/campaigns/genetic-supervision/pilots/terra-luna-001-line-buffer/
  candidate_write: .candidates/terra-luna-001/{run_id}/
  live_log_write: .laboratory/genetic-supervision/terra-luna-001/{run_id}/
  verify_ephemeral_write:
    - dist/web/
    - .laboratory/test-runs/
integrity_hash_inputs:
  - AGENTS.md
  - project.yaml
  - doc/lab/FOUNDATION.md
  - doc/lab/ARCHITECTURE.md
  - package.json
  - package-lock.json
  - vite.config.ts
  - .gitignore
  - src/lab/utility/line-buffer.ts
  - src/lab/transform/run-state.test.ts
  - src/lab/resource/run-store.test.ts
  - doc/campaigns/genetic-supervision/pilots/terra-luna-001-line-buffer/README.md
  - doc/campaigns/genetic-supervision/pilots/terra-luna-001-line-buffer/WORK_ORDER.yaml
  - doc/campaigns/genetic-supervision/pilots/terra-luna-001-line-buffer/MODULE_CARD.yaml
  - doc/campaigns/genetic-supervision/pilots/terra-luna-001-line-buffer/LOG_PROTOCOL.md
  - doc/campaigns/genetic-supervision/pilots/terra-luna-001-line-buffer/LUNA_ADAPTER_CONTRACT.md
  - doc/campaigns/genetic-supervision/pilots/terra-luna-001-line-buffer/LUNA_PROTOCOL.md
  - doc/campaigns/genetic-supervision/pilots/terra-luna-001-line-buffer/TERRA_RUNBOOK.md
  - doc/campaigns/genetic-supervision/pilots/terra-luna-001-line-buffer/EVALUATION.md
authority:
  stable_write: false
  network: false
  package_install: false
  publish: false
  credentials: false
  arbitrary_terminal_api: false
  git_diff: false
  git_mutation: false
task_constraints:
  - Do not change src/lab/utility/line-buffer.ts.
  - Do not create or edit any tracked or stable file.
  - Only the declared npm run verify command may create ignored outputs under
    verify_ephemeral_write; Terra may not edit those paths directly.
  - Use existing Node test style and project formatting.
  - Do not add a dependency.
  - Luna may inspect and report, but may not write candidate or stable files.
  - A successful run has exactly two bounded iteration boundaries; iteration 2
    may record candidate.no_change but still saves its own snapshot.
candidate_artifacts:
  required:
    - line-buffer.test.ts
  allow_additional_entries: false
  allow_directories: false
  allow_symlinks: false
oracles:
  cwd: .
  targeted_timeout_ms: 30000
  project_verify_timeout_ms: 120000
  iteration_1:
    - npm exec -- tsx --test .candidates/terra-luna-001/{run_id}/line-buffer.test.ts
  iteration_2:
    - npm exec -- tsx --test .candidates/terra-luna-001/{run_id}/line-buffer.test.ts
    - npm run verify
required_behaviour_dimensions:
  - complete LF-delimited lines
  - a partial line split across chunks
  - CRLF, including a delimiter split across chunks
  - flush returns the remaining tail once
  - >-
    Current empty behaviour is characterized: push('') and flush() return [];
    a completed empty LF line yields [''].
budgets:
  terra_iterations: 2
  luna_calls: 3
  luna_calls_on_success: exactly
  luna_calls_on_blocked_run: at-most
  luna_physical_attempts_per_logical_call: 1
  luna_max_output_tokens_per_call: 1500
  luna_timeout_ms_per_call: 120000
  luna_max_response_bytes: 32768
  additional_strong_model_escalations: 0
  new_dependencies: 0
  stable_files_changed: 0
decision_options:
  - PASSED
  - PASSED_NO_LUNA_VALUE
  - BLOCKED
  - FAILED
stop_conditions:
  - any attempted stable write
  - candidate write before the declared module session is active
  - missing or non-append-only event log
  - Luna requests expanded authority
  - an oracle cannot run without a new dependency or network access
  - two materialization iterations are exhausted
  - post-close final report or terminal suffix cannot be completed
