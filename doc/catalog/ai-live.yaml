schema: project-catalog/v0
id: ai-live
snapshot: L1_TRANSPORT_P1_COMPLETE_2026-07-14
domain: observable local laboratory with a deterministic realtime simulation
objectives:
  - id: transport-correctness
    priority: P0
    status: profile_proven_pending_p2_p3
    statement: >-
      Every cross-process interaction declares its delivery semantics, lifecycle,
      validation and recovery path instead of treating a typed RPC call or a
      Listen subscription as a complete transport design.
    success_signals:
      - critical commands are not automatically retried and return a typed outcome
      - replayable state resumes by sequence/keyframe after transient reconnect
      - stale/desynchronised consumers are visible and recover deterministically
  - id: transport-ownership
    priority: P0
    status: first_slice_passed
    statement: One browser session owns one injected RPC hub/socket per endpoint and multiplexes approved channels through it.
    success_signals:
      - lab and arena channels share a physical connection when their authority is the same
      - connect, disconnect, reauth and terminal dispose have explicit owners
      - no component independently creates an undocumented duplicate transport
  - id: transport-guardrails
    priority: P1
    status: first_slice_passed
    statement: The server applies runtime boundary validation, RPC limits and request hooks according to each facade policy.
    success_signals:
      - malformed and oversized inputs have an observable typed rejection path
      - subscriptions are bounded and disposed on disconnect
      - public runtime facade exposes no debug or test controls
  - id: transport-evidence
    priority: P1
    status: profile_proven_pending_p2_p3
    statement: Real-socket acceptance proves reconnect, replay, side-effect non-retry and teardown rather than relying on a browser smoke.
    success_signals:
      - reconnect acceptance has an event-sequence oracle
      - a command-side-effect test proves no duplicate apply after transport loss
      - service-restart outcome is explicitly classified (pending); stale detection has a real-socket oracle
  - id: agent-ecology
    priority: P1
    status: planned_blocked_by_transport_p2_p3
    statement: >-
      Use a budgeted ecology of low-cost scouts, candidate builders, deterministic
      verifiers and expensive adjudicators to turn bounded work into evidence-backed decisions.
    success_signals:
      - every agent attempt has a bounded authority envelope, cost ledger and stop reason
      - stable writes and promotion remain unavailable to scout/builder agents
      - deterministic checks and independent review outrank model agreement
      - one pilot reaches a justified KEEP_LOCAL, PROFILE or REJECT decision
  - id: project-consolidation
    priority: P1
    status: active
    statement: >-
      Convert accumulating experiments, traces and decisions into short
      event-driven checkpoints without losing primary evidence or unresolved uncertainty.
    success_signals:
      - CURRENT checkpoint points to the latest evidence-backed project state
      - every material delivery, contradiction or handoff has a checkpoint
      - unknowns remain explicit until a named oracle closes them
  - id: laboratory-roadmap
    priority: P0
    status: active
    statement: >-
      Advance the laboratory through one dependency-aware, evidence-backed work
      packet at a time instead of accumulating disconnected feature ideas.
    success_signals:
      - exactly one implementation packet is marked NOW
      - every gated task names its prerequisite and done condition
      - each material packet ends in evidence and a checkpoint update
entrypoints:
  - project.yaml
  - doc/campaigns/realtime-simulation/TRANSPORT_WORK_PLAN.md
  - src/lab/bindings/service/create-lab-service.ts
  - src/lab/bindings/web/lab-client.ts
  - src/lab/bindings/web/arena-client.ts
  - doc/campaigns/agent-ecology/DETAILED_PLAN.md
  - doc/checkpoints/CURRENT.md
  - doc/roadmap/MASTER_ROADMAP.md
acceptance:
  - npm run verify
  - npm run acceptance:realtime
consumers:
  - local operator web panel
  - Arena runtime browser view
  - Arena debug browser view
  - server-side deterministic bots
observed_capabilities:
  - typed RPC channel multiplexing via wenay-common2 createRpcServerAuto/createRpcClientHub
  - event replay declaration via Replay.replayListen
  - local RPC lifecycle listeners through connectListen/disconnectListen
traces:
  - doc/evidence/traces/2026-07-14-l1-headless-baseline.md
  - doc/evidence/traces/2026-07-14-l1-local-service-smoke.md
  - doc/evidence/traces/2026-07-14-transport-profile-slice.md
  - doc/evidence/traces/2026-07-14-transport-p1-response-loss.md
known_tensions:
  - Service-restart recovery semantics and browser reset UX are not yet classified.
  - Browser-controller behaviour needs a separate visual smoke because Node transport tests deliberately omit the browser-only UI runtime.
