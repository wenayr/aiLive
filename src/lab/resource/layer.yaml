schema: living-layer/v0
identity:
  id: lab-run-resource
  title: Laboratory run resource
  maturity: M1_CLEAN_LAYER
roles:
  - resource
  - verification
entrypoints:
  overview: ENTRY.md
  public_api: ../contracts/lab-contracts.ts
  tests: ../transform/run-state.test.ts
  use_instruction: ../../../AGENTS.md
  evolve_instruction: ../../../doc/lab/PHASE_1_PLAN.md
resources:
  owned:
    - task definitions
    - run records
    - run events
  canonical_types:
    - tTaskDefinition
    - tRunRecord
    - tRunEvent
transforms:
  - validate task manifest
  - reduce legal run transition
operations:
  - create run
  - append run event
  - transition run status
facades:
  runtime:
    - snapshot
    - listTasks
    - startTask
    - cancelRun
  consumer: []
  debug:
    - trace
    - artifact metadata
  testing:
    - fixture reset
    - invariant assertions
  generator: []
  agent: []
dependencies:
  required: []
  optional:
    - wenay-common2 transport binding
    - wenay-react2 UI binding
consumers:
  - local operator web panel
verification:
  contract_tests:
    - run state transition tests
    - manifest validation tests
  property_tests: []
  project_acceptance:
    - npm run verify
generation:
  maturity: G0_NONE
  candidates: []
genome:
  observations:
    - L0 is a local guarded runner, not a container sandbox.
  profiles: []
  decisions: []
reading_order:
  - ENTRY.md
  - ../contracts/lab-contracts.ts
  - ../transform/run-state.ts
  - ../transform/run-state.test.ts
context_policy:
  do_not_load_by_default:
    - ../../../doc/archive/
